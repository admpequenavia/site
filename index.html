<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em breve</title>
<style>
  :root {
    --bg: #12100e;
    --ink: #f5f1ea;
    --accent: #d9a441;
    --muted: #8a8478;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(217,164,65,0.08), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(217,164,65,0.06), transparent 40%);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
  }

  .logo {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 40px;
    color: var(--ink);
  }

  .logo span {
    color: var(--accent);
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.2rem);
    font-weight: 600;
    margin: 0 0 16px;
    letter-spacing: -0.01em;
  }

  p {
    color: var(--muted);
    font-size: 1rem;
    line-height: 1.6;
    margin: 0 0 32px;
  }

  .bar {
    width: 60px;
    height: 3px;
    background: var(--accent);
    margin: 0 auto 32px;
    border-radius: 2px;
  }

  .contact {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .contact a {
    color: var(--accent);
    text-decoration: none;
  }

  .contact a:hover {
    text-decoration: underline;
  }

  footer {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    opacity: 0.6;
  }
</style>
</head>
<body>

  <div class="container">
    <div class="logo">SUA<span>Cia Pequena Via</span></div>
    <div class="bar"></div>
    <h1>Em breve!</h1>
    <p>Estamos preparando algo novo. Nosso site está em construção e logo estará no ar.</p>
    <div class="contact">
      Fale conosco: <a href="mailto:adm.pequenavia@gmail.com">adm.pequenavia@gmail.com</a>
    </div>
  </div>

  <footer>&copy; 2026 — Todos os direitos reservados</footer>

</body>
</html>
